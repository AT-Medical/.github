title: "[QUESTION] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Use this discussion for general questions about AT Medical organization
        standards, templates, or this repository.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Ask your question...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any relevant context or background that may help answer your question.
