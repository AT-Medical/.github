name: Tag Validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-tags:
    name: Validate File Tag Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag taxonomy and file-tags YAML
        shell: bash
        run: |
          set -e
          python3 -c "import yaml" 2>/dev/null || pip install --quiet pyyaml

          python3 -c "
          import yaml, sys

          def load(path):
              with open(path) as f:
                  return yaml.safe_load(f)

          # Load taxonomy
          try:
              taxonomy = load('metadata/tags/taxonomy.yml')
          except FileNotFoundError:
              print('ERROR: metadata/tags/taxonomy.yml not found.')
              sys.exit(1)

          # Load rules
          try:
              rules = load('metadata/tags/rules.yml')
          except FileNotFoundError:
              print('ERROR: metadata/tags/rules.yml not found.')
              sys.exit(1)

          # Load file-tags
          try:
              file_tags = load('metadata/tags/file-tags.yml')
          except FileNotFoundError:
              print('ERROR: metadata/tags/file-tags.yml not found.')
              sys.exit(1)

          print('All tag metadata files loaded successfully.')

          # Validate that defaults contain all mandatory tags
          mandatory = rules.get('mandatory_tags', [])
          defaults = file_tags.get('defaults', {})
          missing = [t for t in mandatory if t not in defaults]
          if missing:
              print(f'WARNING: Default tags missing mandatory dimensions: {missing}')
          else:
              print('All mandatory tag dimensions present in defaults.')

          # Validate that all dimension values in file-tags are defined in taxonomy
          valid_dims = set(taxonomy.get('dimensions', {}).keys())
          errors = 0
          for entry_type in ['files', 'directories']:
              for path_key, tags in (file_tags.get(entry_type) or {}).items():
                  for dim, val in tags.items():
                      if dim not in valid_dims:
                          print(f'ERROR: Unknown tag dimension \"{dim}\" in {entry_type}/{path_key}')
                          errors += 1
                          continue
                      allowed = taxonomy['dimensions'][dim].get('values', [])
                      if allowed and val not in allowed:
                          print(f'ERROR: Value \"{val}\" not allowed for dimension \"{dim}\" in {entry_type}/{path_key}')
                          errors += 1

          if errors > 0:
              print(f'{errors} tag validation error(s) found.')
              sys.exit(1)

          print('Tag validation passed.')
          "

      - name: Validate metadata/repository-profile.yml required fields
        shell: bash
        run: |
          set -e
          python3 -c "import yaml" 2>/dev/null || pip install --quiet pyyaml
          python3 -c "
          import yaml, sys
          with open('metadata/repository-profile.yml') as f:
              data = yaml.safe_load(f)
          required = [
              'repository_name', 'repository_type', 'repository_domain',
              'visibility_class', 'primary_team', 'sensitivity_level',
              'customer_facing', 'artifact_intake_allowed'
          ]
          missing = [k for k in required if k not in data]
          if missing:
              print(f'ERROR: repository-profile.yml missing fields: {missing}')
              sys.exit(1)
          print('repository-profile.yml fields validated.')
          "
