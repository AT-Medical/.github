name: Documentation Consistency Check

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - "**.md"
      - "**.yml"
      - "CODEOWNERS"
  pull_request:
    branches:
      - main
      - develop
      - staging
    paths:
      - "**.md"
      - "**.yml"
      - "CODEOWNERS"
  schedule:
    # Run weekly on Mondays at 07:00 UTC
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  doc-structure-check:
    name: Documentation Structure Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check required documentation files
        shell: bash
        run: |
          set -e
          missing=0

          docs=(
            "README.md"
            "SECURITY.md"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "LICENSE"
            "CHANGELOG.md"
            "CODEOWNERS"
            "ARCHITECTURE.md"
            "DECISIONS.md"
            "metadata/repository-profile.yml"
            "configs/automation/copilot/repository-purpose.yml"
          )

          for f in "${docs[@]}"; do
            if [ -f "$f" ]; then
              echo "FOUND: $f"
            else
              echo "MISSING: $f"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing required documentation file(s) are missing."
            exit 1
          fi
          echo "All required documentation files are present."

      - name: Check required templates
        shell: bash
        run: |
          set -e
          missing=0

          templates=(
            ".github/ISSUE_TEMPLATE/bug_report.yml"
            ".github/ISSUE_TEMPLATE/feature_request.yml"
            ".github/ISSUE_TEMPLATE/governance_feedback.yml"
          )

          for t in "${templates[@]}"; do
            if [ -f "$t" ]; then
              echo "FOUND: $t"
            else
              echo "MISSING: $t"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing required template(s) are missing."
            exit 1
          fi
          echo "All required templates are present."

      - name: Check version block in major documentation
        shell: bash
        run: |
          set -e
          files=("README.md" "SECURITY.md" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md")
          missing=0

          for f in "${files[@]}"; do
            if grep -q "Version:" "$f" 2>/dev/null; then
              echo "VERSION BLOCK FOUND: $f"
            else
              echo "VERSION BLOCK MISSING: $f"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing file(s) are missing version/verification blocks."
            exit 1
          fi
          echo "All major documentation files contain version blocks."

      - name: Validate YAML files
        shell: bash
        run: |
          set -e
          if ! command -v python3 &>/dev/null; then
            echo "python3 not available - skipping YAML validation"
            exit 0
          fi
          if ! python3 -c "import yaml" 2>/dev/null; then
            python3 -m pip install --quiet pyyaml
          fi

          failed=0
          while IFS= read -r -d '' f; do
            if python3 -c "import sys,yaml; yaml.safe_load(open(sys.argv[1]))" "$f" 2>/dev/null; then
              echo "VALID YAML: $f"
            else
              failed=$((failed + 1))
            fi
          done < <(find .github/workflows metadata configs .github/ISSUE_TEMPLATE .github/DISCUSSION_TEMPLATE -name "*.yml" -print0 2>/dev/null)

          if [ "$failed" -gt 0 ]; then
            echo "$failed YAML file(s) are invalid."
            exit 1
          fi
          echo "All YAML files are valid."
