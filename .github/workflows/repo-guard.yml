name: Repo Guard

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  repo-check:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Repository overview
        run: |
          echo "Repo Guard basic check running"

          echo "Listing repository files:"
          ls -la

          echo "Checking key files..."

          if [ -f README.md ]; then
            echo "README.md found"
          else
            echo "README.md missing"
          fi

          if [ -f SECURITY.md ]; then
            echo "SECURITY.md found"
          else
            echo "SECURITY.md missing"
          fi

          if [ -f CONTRIBUTING.md ]; then
            echo "CONTRIBUTING.md found"
          else
            echo "CONTRIBUTING.md missing"
          fi

          if [ -f CODEOWNERS ]; then
            echo "CODEOWNERS found"
          else
            echo "CODEOWNERS missing"
          fi

          echo "Basic repo structure check complete."
