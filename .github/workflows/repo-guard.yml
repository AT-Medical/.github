name: Repo Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  repo-summary:
    name: Basic repository check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Basic structure check
        shell: bash
        run: |
          echo "Running basic repository checks..."

          if [ ! -f README.md ]; then
            echo "README.md is missing"
          else
            echo "README.md found"
          fi

          if [ -d ".github" ]; then
            echo ".github directory found"
          else
            echo ".github directory missing"
          fi

          if [ -f ".github/copilot-instructions.md" ]; then
            echo "Copilot instructions found"
          else
            echo "Copilot instructions missing"
          fi

          if [ -f ".github/dependabot.yml" ]; then
            echo "Dependabot config found"
          else
            echo "Dependabot config missing"
          fi

      - name: Create workflow summary
        shell: bash
        run: |
          {
            echo "## Repo Guard summary"
            echo ""
            echo "- Workflow started successfully"
            echo "- Repository checkout completed"
            echo "- Basic structure check completed"
            echo ""
            echo "This is a minimal fallback workflow without external marketplace actions."
          } >> "$GITHUB_STEP_SUMMARY"
