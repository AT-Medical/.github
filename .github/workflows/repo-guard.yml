name: Repo Guard

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  repo-check:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Repository overview
        shell: bash
        run: |
          set -euo pipefail
          echo "Repo Guard basic check running"

          echo "Listing repository files:"
          ls -la

          echo "Checking key files..."
          missing=0

          for f in README.md SECURITY.md CONTRIBUTING.md CODEOWNERS; do
            if [ -f "$f" ]; then
              echo "$f found"
            else
              echo "$f missing"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing required file(s) missing."
            exit 1
          fi

          echo "Basic repo structure check complete."
