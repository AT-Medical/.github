name: CI

on:
  push:
    branches:
      - main
      - develop
      - staging

  pull_request:
    branches:
      - main
      - develop
      - staging

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      run_lint: true
      run_tests: true
      node_version: "20"
