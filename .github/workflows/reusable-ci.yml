name: Reusable CI

on:
  workflow_call:
    inputs:
      run_lint:
        required: false
        type: boolean
        default: true
      run_tests:
        required: false
        type: boolean
        default: true
      node_version:
        required: false
        type: string
        default: "20"

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for package.json
        id: package_check
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "has_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found. Skipping npm-based steps."
          fi

      - name: Check for package-lock.json
        id: lock_check
        if: steps.package_check.outputs.has_package == 'true'
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lock=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lock=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json found."
          fi

      - name: Setup Node.js
        if: steps.package_check.outputs.has_package == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ steps.lock_check.outputs.has_lock == 'true' && 'npm' || '' }}

      - name: Install dependencies
        if: steps.package_check.outputs.has_package == 'true' && steps.lock_check.outputs.has_lock == 'true'
        run: npm ci

      - name: Install dependencies fallback
        if: steps.package_check.outputs.has_package == 'true' && steps.lock_check.outputs.has_lock != 'true'
        run: npm install

      - name: Check whether lint script exists
        id: lint_check
        if: steps.package_check.outputs.has_package == 'true' && inputs.run_lint
        shell: bash
        run: |
          if npm run | grep -qE '^[[:space:]]+lint'; then
            echo "has_lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lint=false" >> "$GITHUB_OUTPUT"
            echo "No lint script found. Skipping lint."
          fi

      - name: Run lint
        if: steps.package_check.outputs.has_package == 'true' && inputs.run_lint && steps.lint_check.outputs.has_lint == 'true'
        run: npm run lint

      - name: Check whether test script exists
        id: test_check
        if: steps.package_check.outputs.has_package == 'true' && inputs.run_tests
        shell: bash
        run: |
          if npm run | grep -qE '^[[:space:]]+test'; then
            echo "has_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "No test script found. Skipping tests."
          fi

      - name: Run tests
        if: steps.package_check.outputs.has_package == 'true' && inputs.run_tests && steps.test_check.outputs.has_test == 'true'
        run: npm test -- --ci

      - name: Repository sanity check
        shell: bash
        run: |
          echo "Running repository sanity checks..."
          test -d .github
          test -d .github/workflows
          echo "Basic repository structure looks fine."

      - name: Run repository structure tests
        if: inputs.run_tests
        shell: bash
        run: |
          if [ -f tests/repo-check.sh ]; then
            echo "Running tests/repo-check.sh..."
            bash tests/repo-check.sh
          else
            echo "No repo-check.sh found. Skipping."
          fi
