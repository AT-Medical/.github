name: CI Validation

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
      - "release/**"
      - "copilot/**"
  pull_request:

permissions:
  contents: read

jobs:
  structure-validation:
    name: Repository Structure Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate required directories
        shell: bash
        run: |
          set -e
          missing=0

          for d in \
            metadata \
            metadata/tags \
            configs/automation \
            docs \
            docs/architecture \
            docs/governance \
            docs/operations \
            docs/deployment \
            scripts/validate \
            scripts/reporting \
            scripts/cleanup \
            templates \
            status \
            artifacts \
            artifacts/incoming \
            artifacts/staged \
            artifacts/releases; do
            if [ -d "$d" ]; then
              echo "FOUND dir: $d"
            else
              echo "MISSING dir: $d"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing required directory/directories missing."
            exit 1
          fi
          echo "All required directories present."

      - name: Validate required metadata files
        shell: bash
        run: |
          set -e
          missing=0

          for f in \
            metadata/repository-profile.yml \
            metadata/tags/taxonomy.yml \
            metadata/tags/rules.yml \
            metadata/tags/file-tags.yml; do
            if [ -f "$f" ]; then
              echo "FOUND: $f"
            else
              echo "MISSING: $f"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing required metadata file(s) missing."
            exit 1
          fi
          echo "All required metadata files present."

      - name: Validate required governance files
        shell: bash
        run: |
          set -e
          missing=0

          for f in \
            README.md \
            SECURITY.md \
            CONTRIBUTING.md \
            CODE_OF_CONDUCT.md \
            LICENSE \
            CHANGELOG.md \
            CODEOWNERS; do
            if [ -f "$f" ]; then
              echo "FOUND: $f"
            else
              echo "MISSING: $f"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing required governance file(s) missing."
            exit 1
          fi
          echo "All required governance files present."

  corporate-identity:
    name: Corporate Identity Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check AT Medical GmbH® spelling
        shell: bash
        run: |
          set -e
          issues=0

          # Check for incorrect spelling patterns (case-insensitive partial matches)
          if grep -rl --include="*.md" "AT-Medical GmbH" . 2>/dev/null | grep -v ".git"; then
            echo "WARNING: Found 'AT-Medical GmbH' (hyphen in prose) – use 'AT Medical GmbH®' in prose."
            issues=$((issues + 1))
          fi

          if [ "$issues" -gt 0 ]; then
            echo "Corporate identity issues found. Please use 'AT Medical GmbH®' in prose."
            exit 1
          fi
          echo "Corporate identity validation passed."

      - name: Check documentation headers include AT Medical branding
        shell: bash
        run: |
          set -e
          for f in README.md SECURITY.md CONTRIBUTING.md; do
            if [ -f "$f" ]; then
              if grep -qi "AT Medical" "$f"; then
                echo "OK: $f contains AT Medical branding."
              else
                echo "WARNING: $f does not reference AT Medical."
              fi
            fi
          done

  workflow-validation:
    name: Workflow File Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate YAML syntax of all workflows
        shell: bash
        run: |
          set -e
          python3 -c "import yaml" 2>/dev/null || pip install --quiet pyyaml
          error=0

          for wf in .github/workflows/*.yml; do
            if python3 -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$wf" 2>/dev/null; then
              echo "OK: $wf"
            else
              echo "INVALID: $wf"
              error=$((error + 1))
            fi
          done

          if [ "$error" -gt 0 ]; then
            echo "$error workflow file(s) have invalid YAML."
            exit 1
          fi
          echo "All workflow files are valid YAML."
