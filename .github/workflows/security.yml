name: Security Checks

on:
  push:
    branches:
      - main
      - develop
      - staging
  pull_request:
    branches:
      - main
      - develop
      - staging
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  security-checks:
    name: Basic Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check .gitignore exists
        shell: bash
        run: |
          set -e
          test -f .gitignore
          echo ".gitignore exists."

      - name: Check SECURITY.md exists
        shell: bash
        run: |
          set -e
          if [ -f SECURITY.md ] || [ -f .github/SECURITY.md ]; then
            echo "SECURITY.md found."
          else
            echo "SECURITY.md missing."
            exit 1
          fi

      - name: Check CODEOWNERS optional presence
        shell: bash
        run: |
          set -e
          if [ -f .github/CODEOWNERS ] || [ -f CODEOWNERS ] || [ -f docs/CODEOWNERS ]; then
            echo "CODEOWNERS found."
          else
            echo "CODEOWNERS not found. This is allowed, but recommended."
          fi

      - name: Validate GitHub workflow directory
        shell: bash
        run: |
          set -e
          test -d .github/workflows
          count=$(find .github/workflows -type f | wc -l)
          echo "Workflow file count: $count"
          if [ "$count" -eq 0 ]; then
            echo "No workflow files found."
            exit 1
          fi

      - name: Check for forbidden sensitive filenames
        shell: bash
        run: |
          set -euo pipefail
          found=0

          for pattern in ".env" ".env.local" ".env.production" ".env.development" "id_rsa" "id_dsa" "id_ed25519" "id_ecdsa" "*.p12" "*.pfx" "*.key" "*.pem"; do
            if find . \
              -type f \
              -name "$pattern" \
              ! -path "*/.git/*" \
              ! -path "*/vendor/*" \
              ! -path "*/node_modules/*" \
              ! -path "*/.github/workflows/*" \
              -print -quit 2>/dev/null | grep -q .; then
              echo "Forbidden file found for pattern: $pattern"
              found=1
              break
            fi
          done

          if [ "$found" -ne 0 ]; then
            echo "Sensitive files detected."
            exit 1
          fi

          echo "No forbidden sensitive files found."
